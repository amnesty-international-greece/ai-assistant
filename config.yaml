# AI-in-AI Platform Configuration
# Non-secret configuration values

app:
  name: "AI-in-AI Platform"
  version: "0.1.0"

llm:
  provider: "gemini"              # "gemini" (free, prototyping) | "claude" (production)
  model: "gemini-3.1-flash-lite-preview"  # 500 req/day free | switch to "claude-sonnet-4-20250514" for production
  max_tokens: 4096
  temperature: 0.3

claude:
  model: "claude-sonnet-4-20250514"  # kept for reference
  max_tokens: 4096
  temperature: 0.3

storage:
  database_path: "data/amnesty.db"
  prompts_dir: "data/prompts"

onedrive:
  archive_root: "/Amnesty/Archive"  # Base path in OneDrive for document archival

google:
  templates_folder_id: ""  # Google Drive folder ID containing document templates
  decisions_sheet_id: "1pfSGvgoGuNAkI1G34-bDmuSvRDwiEdhQydUZClmTh9c"   # Βιβλίο Αποφάσεων ΔΣ
  agenda_sheet_id: "17_K3yFcgmEHRiki_kJ-fjzHhT-LhT0CSGd5koMwo7To"  # Google Sheets ID for meeting agendas
  invitation_template_id: "1n_2cpUazlYSYKNSSgEqGSiOSUGdCRc9uAJ8suEpRDDU"  # [Πρότυπο] Πρόσκληση Google Doc
  minutes_drafts_folder_id: "1rk-wwL1tHJohd9tmjEE_mbJRK9CKjZCt"   # Google Drive folder with SecGen's draft notes
  protokollo_sheet_id: "19gZeQ4IaiCqvsXSIyOuEbqrI4WNOYEJ9Vz--RgnVRUs"   # [Πρωτόκολλο] Αρχείο ΔΣ (Google Sheet in minutes drafts folder)

zoom:
  meeting_defaults:
    duration: 120  # minutes
    timezone: "Europe/Athens"

brevo:
  sender_email: "info@amnesty.org.gr"
  sender_name: "Διεθνής Αμνηστία - Ελληνικό Τμήμα"
  newsletter_template_id: 234   # [Πρότυπο] Πρόσκληση ΔΣ

  # ── Contact list ─────────────────────────────────────────────────────────────
  # The master membership list — used as the parent for all segments below.
  # We do NOT use this directly as a newsletter recipient (too broad).
  contact_lists:
    mitroο_melon: 74             # Μητρώο Μελών — master list (do not send newsletters directly)

  # ── CRM Segments ─────────────────────────────────────────────────────────────
  # Segments are subsets of Μητρώο Μελών (list 74) for targeted sends.
  # SAFETY: newsletter_list_ids is intentionally empty during testing.
  #         Populate it workflow-by-workflow when going to production.
  segments:
    regular_members:   1         # Τακτικά Μέλη — receive most newsletters
    candidate_members: 3         # Υποψήφια Μέλη — welcome email + onboarding only
    youth_members:     5         # Νέοι/Νέες — youth-specific newsletters

  # ── Newsletter recipients ─────────────────────────────────────────────────────
  # Add segment/list IDs here only when ready to go live for a specific workflow.
  # Leave empty to prevent any accidental sends during testing.
  newsletter_list_ids: []        # e.g. [1] for regular_members only

discord:
  channels:
    announcements: ""  # Channel ID for announcements
    verification: ""   # Channel ID for member verification

workflows:
  board_meeting:
    reminder_hours_before: 3
    min_notice_days: 7
    max_advance_days: 14      # warn if inviting more than this many days in advance
    minutes_share_message: "Σας κοινοποιούνται τα πρόχειρα πρακτικά προς σχολιασμό. Παρακαλώ αφήστε τα σχόλιά σας απευθείας στο έγγραφο."
    # Pre-registered on Zoom so each gets a personal join link (no form needed).
    # Add one entry per board member. The group inbox covers everyone for now.
    board_members:
      - email: "board@amnesty.org.gr"
        first_name: "Διοικητικό"
        last_name: "Συμβούλιο"
      - email: "director@amnesty.org.gr"
        first_name: "Διευθυντής"
        last_name: "Τμήματος"
  general_assembly:
    min_notice_days: 30
    min_electronic_notice_days: 15

# ── Test / dry-run mode ───────────────────────────────────────────────────────
# When running with --dry-run, emails are redirected here instead of being
# skipped entirely, so you can verify layout/content before going live.
# Leave dry_run_email empty to skip emails completely during dry-runs.
testing:
  dry_run_email: "georgeathanasias@gmail.com"   # your personal inbox
